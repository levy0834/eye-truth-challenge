name: Quant Strategy CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

jobs:
  backtest-and-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib requests akshare yfinance
    
    - name: Fetch ETF data
      run: |
        cd projects/a-share-etf-quant
        python3 scripts/fetch_etf_data.py || echo "Data fetch may fail, using existing data"
    
    - name: Run backtest
      run: |
        cd projects/a-share-etf-quant
        python3 scripts/explore_strategies.py
    
    - name: Prepare dashboard data
      run: |
        cd projects/a-share-etf-quant
        python3 scripts/prepare_dashboard.py
    
    - name: Copy dashboard files
      run: |
        mkdir -p dashboard
        cp -r quant-trading-system/dashboard/* dashboard/ 2>/dev/null || true
    
    - name: Upload dashboard artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dashboard
        path: dashboard/
    
    - name: Deploy to GitHub Pages (optional)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "Deploy to GitHub Pages here (requires gh-pages branch setup)"
        # git checkout --orphan gh-pages
        # git --git-dir dashboard/.git add --all
        # git --git-dir dashboard/.git commit -m "Update dashboard"
        # git push origin gh-pages
