    <script>

        const STRATEGY_SUMMARY = `strategy,avg_return,std_return,min_return,max_return,avg_sharpe,avg_maxdd,avg_winrate,stock_count
MACrossStrategy,4.17,10.38,-10.34,47.38,-0.33,-8.26,17.69,100
MACDCrossStrategy,2.01,9.18,-13.04,31.77,-0.43,-8.56,16.73,100
TAConfluenceStrategy,1.58,5.05,-8.29,14.44,-0.69,-5.04,18.06,100
RSIStrategy,0.99,6.86,-17.66,21.82,-0.51,-7.26,20.89,100
BollingerStrategy,0.9,4.76,-14.54,9.9,-0.6,-5.87,21.25,100`;

        // ============ 解析数据 ============
        const STRATEGY_NAMES = {
            'MACrossStrategy': 'MA均线',
            'MACDCrossStrategy': 'MACD',
            'RSIStrategy': 'RSI',
            'BollingerStrategy': '布林带',
            'TAConfluenceStrategy': '多因子'
        };

        const STRATEGY_COLORS = {
            'MACrossStrategy': '#3b82f6',
            'MACDCrossStrategy': '#10b981',
            'RSIStrategy': '#f59e0b',
            'BollingerStrategy': '#ef4444',
            'TAConfluenceStrategy': '#8b5cf6'
        };

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 7) continue;
                const obj = {};
                headers.forEach((h, j) => {
                    let v = cols[j] ? cols[j].trim() : '';
                    if (v && !isNaN(v) && v !== '-' && v !== '') {
                        const num = parseFloat(v);
                        if (!isNaN(num)) v = num;
                    }
                    obj[h] = v;
                });
                if (obj.symbol) result.push(obj);
            }
            return result;
        }

        const allData = parseCSV(RAW_DATA);
        const summaryData = parseCSV(STRATEGY_SUMMARY);

        // ============ 页面渲染 ============
        document.addEventListener('DOMContentLoaded', () => {
            updateKPI();
            renderSummary();
            applyFilter();
            renderChart();
            renderTop10();
        });

        function updateKPI() {
            const uniqueStocks = new Set(allData.map(d => d.symbol)).size;
            document.getElementById('total-count').textContent = allData.length;
            document.getElementById('stock-count').textContent = uniqueStocks;
            if (summaryData[0]) {
                document.getElementById('best-strategy').textContent = STRATEGY_NAMES[summaryData[0].strategy] || summaryData[0].strategy;
                document.getElementById('best-return').textContent = parseFloat(summaryData[0].avg_return).toFixed(2) + '%';
            }
        }

        function renderSummary() {
            const tbody = document.querySelector('#summary-table tbody');
            tbody.innerHTML = summaryData.map(s => `
                <tr>
                    <td class="color-${s.strategy.toLowerCase().replace('cross', '')}">${STRATEGY_NAMES[s.strategy]||s.strategy}</td>
                    <td class="${s.avg_return>=0?'text-green':'text-red'}">${parseFloat(s.avg_return).toFixed(2)}</td>
                    <td class="text-red">${parseFloat(s.avg_maxdd).toFixed(2)}</td>
                    <td class="${s.avg_sharpe>=0?'text-green':'text-red'}">${parseFloat(s.avg_sharpe).toFixed(2)}</td>
                    <td class="text-green">${parseFloat(s.avg_winrate).toFixed(2)}</td>
                    <td>${s.stock_count}</td>
                </tr>
            `).join('');
        }

        let filteredData = [];
        let currentPage = 1;
        let pageSize = 50;
        let sortField = 'test_return_pct';
        let sortDesc = true;

        function applyFilter() {
            const filterVal = document.getElementById('filter-strategy').value;
            pageSize = parseInt(document.getElementById('page-size').value);
            currentPage = 1;
            
            filteredData = allData.filter(d => filterVal === 'all' || d.strategy === filterVal);
            
            filteredData.sort((a, b) => {
                const va = a[sortField] || 0;
                const vb = b[sortField] || 0;
                return sortDesc ? vb - va : va - vb;
            });
            
            renderTable();
        }

        function renderTable() {
            const tbody = document.querySelector('#detail-table tbody');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);
            
            tbody.innerHTML = pageData.map(d => `
                <tr>
                    <td>${d.symbol}</td>
                    <td class="color-${d.strategy.toLowerCase().replace('cross', '')}">${STRATEGY_NAMES[d.strategy]||d.strategy}</td>
                    <td class="${d.test_return_pct>=0?'text-green':'text-red'}">${parseFloat(d.test_return_pct).toFixed(2)}</td>
                    <td>${parseFloat(d.test_sharpe||0).toFixed(2)}</td>
                    <td class="text-red">${parseFloat(d.test_maxdd_pct||0).toFixed(2)}</td>
                    <td>${d.test_trades||0}</td>
                    <td class="${d.win_rate_pct>=0?'text-green':'text-red'}">${parseFloat(d.win_rate_pct||0).toFixed(2)}</td>
                </tr>
            `).join('');
            
            document.getElementById('table-info').textContent = 
                `显示 ${start + 1}-${Math.min(end, filteredData.length)} / ${filteredData.length} 条`;
        }

        function renderChart() {
            const ctx = document.getElementById('dist-chart');
            if (!ctx) return;
            
            const bins = { '<-5%':0, '-5~0%':0, '0~5%':0, '5~10%':0, '10~15%':0, '>15%':0 };
            allData.forEach(d => {
                const r = parseFloat(d.test_return_pct) || 0;
                if (r < -5) bins['<-5%']++;
                else if (r < 0) bins['-5~0%']++;
                else if (r < 5) bins['0~5%']++;
                else if (r < 10) bins['5~10%']++;
                else if (r < 15) bins['10~15%']++;
                else bins['>15%']++;
            });
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(bins),
                    datasets: [{
                        label: '策略数量',
                        data: Object.values(bins),
                        backgroundColor: 'rgba(59, 130, 246, 0.6)',
                        borderColor: 'rgba(59, 130, 246, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { color: '#666' }, grid: { color: '#eee' } },
                        x: { ticks: { color: '#666' }, grid: { display: false } }
                    }
                }
            });
        }

        function renderTop10() {
            const top10 = [...allData].sort((a, b) => b.test_return_pct - a.test_return_pct).slice(0, 10);
            const grid = document.getElementById('top10-grid');
            grid.innerHTML = top10.map((d, i) => `
                <div class="top10-card" style="border-left-color: ${STRATEGY_COLORS[d.strategy]}">
                    <div style="color: #999; font-size: 10px;">#${i+1} ${d.symbol}</div>
                    <div style="color: ${STRATEGY_COLORS[d.strategy]}; font-size: 11px; margin: 5px 0;">${STRATEGY_NAMES[d.strategy]||d.strategy}</div>
                    <div class="${d.test_return_pct>=0?'text-green':'text-red'}" style="font-size: 18px; font-weight: bold;">${parseFloat(d.test_return_pct).toFixed(2)}%</div>
                </div>
            `).join('');
        }
    </script>
