<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化策略分析看板 - 训练集/测试集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.min.js"></script>
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            margin: 0;
            color: #e5e7eb;
        }
        .glass-card {
            background: rgba(30, 30, 46, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
        }
        table { border-collapse: separate; border-spacing: 0; }
        th {
            background: rgba(99, 102, 241, 0.15);
            color: #c7d2fe;
            font-weight: 600;
            padding: 8px 10px;
            font-size: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 6px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 12px;
        }
        tr:hover { background: rgba(99, 102, 241, 0.08); }
        .pagination { display: flex; gap: 4px; align-items: center; }
        .pagination button {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #e5e7eb;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .pagination button:hover:not(:disabled) { background: rgba(99, 102, 241, 0.4); }
        .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
        .loading-bar {
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            animation: loading 2s infinite;
            position: fixed;
            top: 0; left: 0; right: 0; z-index: 9999;
        }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>
    <div class="loading-bar" id="loading-bar"></div>
    
    <div class="container mx-auto px-3 py-6 max-w-7xl">
        <header class="mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400 bg-clip-text text-transparent">
                        📈 量化策略分析看板
                    </h1>
                    <p class="text-gray-500 text-xs mt-1">A股ETF回测 · 训练集 vs 测试集对比</p>
                </div>
                <div class="flex items-center gap-2">
                    <span class="px-2 py-1 bg-blue-500/20 text-blue-300 rounded text-xs border border-blue-500/30" id="status">初始化...</span>
                    <button onclick="loadAllData()" class="px-3 py-1 bg-indigo-600 hover:bg-indigo-700 rounded text-xs transition">🔄 刷新</button>
                </div>
            </div>
        </header>

        <!-- 数据集切换 -->
        <section class="mb-4">
            <div class="flex gap-2">
                <button id="tab-train" class="px-4 py-2 rounded-lg text-sm font-medium border transition tab-active" onclick="switchTab('train')">
                    📚 训练集 (2015-2021)
                </button>
                <button id="tab-test" class="px-4 py-2 rounded-lg text-sm font-medium border border-gray-700 text-gray-400 hover:bg-gray-800 transition" onclick="switchTab('test')">
                    🔬 测试集 (2022-2025)
                </button>
            </div>
        </section>

        <!-- KPI -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
            <div class="glass-card p-3">
                <div class="text-gray-500 text-xs">策略数量</div>
                <div class="text-xl font-bold text-white" id="kpi-strategies">--</div>
            </div>
            <div class="glass-card p-3">
                <div class="text-gray-500 text-xs">最佳策略</div>
                <div class="text-base font-bold text-green-400" id="kpi-best">--</div>
            </div>
            <div class="glass-card p-3">
                <div class="text-gray-500 text-xs">最高收益</div>
                <div class="text-xl font-bold text-emerald-400" id="kpi-return">--</div>
            </div>
            <div class="glass-card p-3">
                <div class="text-gray-500 text-xs">平均夏普</div>
                <div class="text-xl font-bold text-blue-400" id="kpi-sharpe">--</div>
            </div>
        </section>

        <!-- 策略排名 -->
        <section class="mb-6">
            <h2 class="text-base font-bold mb-3 flex items-center">
                <span class="w-1 h-5 bg-blue-500 rounded mr-2"></span>
                策略排名
                <span id="dataset-badge" class="ml-2 px-2 py-0.5 bg-blue-500/20 text-blue-300 rounded text-xs border border-blue-500/30"></span>
            </h2>
            <div class="glass-card p-3 overflow-x-auto">
                <table class="w-full text-xs">
                    <thead>
                        <tr>
                            <th class="text-left py-2 cursor-pointer" onclick="sort('strategy')">策略⇅</th>
                            <th class="text-right py-2 cursor-pointer text-green-400" onclick="sort('total_return_pct')">总收益%⇅</th>
                            <th class="text-right py-2 cursor-pointer text-blue-400" onclick="sort('annual_return')">年化%⇅</th>
                            <th class="text-right py-2 cursor-pointer text-red-400" onclick="sort('max_drawdown_pct')">最大回撤%⇅</th>
                            <th class="text-right py-2 cursor-pointer" onclick="sort('sharpe_ratio')">夏普⇅</th>
                            <th class="text-right py-2">胜率%</th>
                            <th class="text-right py-2">交易次数</th>
                        </tr>
                    </thead>
                    <tbody id="summary-body"></tbody>
                </table>
            </div>
        </section>

        <!-- 详细表格 + 收益分布 -->
        <section class="mb-6">
            <div class="flex flex-col lg:flex-row gap-4">
                <div class="lg:w-3/5">
                    <h2 class="text-base font-bold mb-3 flex items-center">
                        <span class="w-1 h-5 bg-pink-500 rounded mr-2"></span>
                        详细回测结果
                    </h2>
                    <div class="glass-card p-3">
                        <div class="mb-3 flex flex-wrap gap-2 items-center">
                            <select id="filter-strategy" class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs">
                                <option value="all">全部策略</option>
                            </select>
                            <select id="page-size" class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs">
                                <option value="10">10</option>
                                <option value="20" selected>20</option>
                                <option value="50">50</option>
                            </select>
                            <div class="pagination ml-auto">
                                <button id="prev" disabled>上一页</button>
                                <span class="page-info text-xs">
                                    第 <input type="number" id="page-num" min="1" value="1" class="w-8 bg-gray-800 border border-gray-700 rounded px-1 text-center text-xs"> / <span id="total-pages">1</span>
                                </span>
                                <button id="next" disabled>下一页</button>
                            </div>
                        </div>
                        <div class="overflow-x-auto border border-gray-800 rounded" style="max-height: 450px; overflow-y: auto;">
                            <table class="w-full">
                                <thead>
                                    <tr>
                                        <th class="text-left w-24 cursor-pointer" onclick="sort('strategy')">策略⇅</th>
                                        <th class="text-right w-16 cursor-pointer text-green-400" onclick="sort('total_return_pct')">收益%⇅</th>
                                        <th class="text-right w-14 cursor-pointer text-blue-400" onclick="sort('annual_return')">年化%⇅</th>
                                        <th class="text-right w-14 text-red-400">回撤%</th>
                                        <th class="text-right w-10" onclick="sort('sharpe_ratio')">夏普⇅</th>
                                        <th class="text-right w-10">胜率%</th>
                                        <th class="text-right w-10">交易</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body"></tbody>
                            </table>
                        </div>
                        <div class="mt-2 text-xs text-gray-500 text-right" id="table-info"></div>
                    </div>
                </div>

                <div class="lg:w-2/5 space-y-4">
                    <div class="glass-card p-3">
                        <h3 class="text-xs font-bold mb-2 text-gray-300">📊 收益分布</h3>
                        <div class="relative" style="height: 220px;">
                            <canvas id="dist-chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 资金曲线 -->
        <section class="mb-6">
            <h2 class="text-base font-bold mb-3 flex items-center">
                <span class="w-1 h-5 bg-rose-500 rounded mr-2"></span>
                📈 资金曲线
            </h2>
            <div class="glass-card p-3">
                <div class="mb-2 flex items-center gap-2 flex-wrap">
                    <select id="curve-strategy" class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs"></select>
                    <label class="text-xs text-gray-400">
                        <input type="checkbox" id="show-benchmark" checked onchange="updateEquityChart()"> 显示基准
                    </label>
                </div>
                <div class="relative" style="height: 320px;">
                    <canvas id="equity-chart"></canvas>
                </div>
            </div>
        </section>

        <!-- Top 10 -->
        <section class="mb-6">
            <h2 class="text-base font-bold mb-3 flex items-center">
                <span class="w-1 h-5 bg-amber-500 rounded mr-2"></span>
                🏆 Top 10
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-2" id="top10-grid"></div>
        </section>

        <footer class="text-gray-600 text-xs text-center py-3 border-t border-gray-800">
            <p>数据更新时间: <span id="update-time"></span></p>
        </footer>
    </div>

    <script>
        // ==================== 配置 ====================
        const STRATEGY_COLORS = {
            'MA Cross': '#3b82f6',
            'MA Double': '#10b981',
            'MA Triple': '#f59e0b',
            'MACD Cross': '#ef4444',
            'MACD Hist': '#8b5cf6',
            'RSI Extreme': '#ec4899',
            'MA+RSI Combo': '#06b6d4',
            'Bollinger Band': '#84cc16',
            'Bollinger Squeeze': '#f97316',
            'Volume Confirm': '#6366f1',
            'TA Confluence': '#14b8a6',
            'TA Strengthened': '#a855f7'
        };

        const STRATEGY_NAMES_CN = {
            'MA Cross': 'MA均线',
            'MA Double': '双均线',
            'MA Triple': '三均线',
            'MACD Cross': 'MACD金叉',
            'MACD Hist': 'MACD柱状',
            'RSI Extreme': 'RSI超买超卖',
            'MA+RSI Combo': 'MA+RSI组合',
            'Bollinger Band': '布林带突破',
            'Bollinger Squeeze': '布林带收缩',
            'Volume Confirm': '成交量确认',
            'TA Confluence': '多因子共振',
            'TA Strengthened': '强化多因子'
        };

        // ==================== 数据状态 ====================
        let trainData = [], testData = [], currentData = [];
        let currentTab = 'train';
        let equityData = {};
        let filteredData = [], currentPage = 1, pageSize = 20;
        let sortField = 'total_return_pct', sortDesc = true;

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllData();
        });

        async function loadAllData() {
            setStatus('加载中...', true);
            try {
                // 并行加载
                const [trainRes, testRes] = await Promise.all([
                    fetch('details_train.csv'),
                    fetch('details_test.csv')
                ]);

                if (!trainRes.ok) throw new Error('训练集数据缺失');

                const [trainTxt, testTxt] = await Promise.all([
                    trainRes.text(),
                    testRes.text()
                ]);

                trainData = parseCSV(trainTxt);
                testData = testRes.ok ? parseCSV(testTxt) : [];
                equityData = {};  // 延迟加载

                console.log(`✅ 数据加载: 训练 ${trainData.length}, 测试 ${testData.length}, 资金曲线 ${Object.keys(equityData).length}`);

                // 初始化显示
                switchTab('train');

                setStatus('就绪', false);
                document.getElementById('update-time').textContent = new Date().toLocaleTimeString('zh-CN');
            } catch (e) {
                console.error(e);
                setStatus('失败', false);
                alert('数据加载失败: ' + e.message);
            }
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length < headers.length) continue;
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    let val = (cols[j] || '').trim();
                    if (val && !isNaN(val) && val !== '-' && val !== '') {
                        const num = parseFloat(val);
                        if (!isNaN(num)) val = num;
                    }
                    obj[headers[j]] = val;
                }
                if (obj.strategy) result.push(obj);
            }
            return result;
        }

        // ==================== Tab 切换 ====================
        function switchTab(tab) {
            currentTab = tab;
            currentData = tab === 'train' ? trainData : testData;

            // 更新 Tab 样式
            document.getElementById('tab-train').className = tab === 'train' 
                ? 'px-4 py-2 rounded-lg text-sm font-medium border transition tab-active' 
                : 'px-4 py-2 rounded-lg text-sm font-medium border border-gray-700 text-gray-400 hover:bg-gray-800 transition';
            document.getElementById('tab-test').className = tab === 'test' 
                ? 'px-4 py-2 rounded-lg text-sm font-medium border transition tab-active' 
                : 'px-4 py-2 rounded-lg text-sm font-medium border border-gray-700 text-gray-400 hover:bg-gray-800 transition';

            // 更新筛选器
            const filter = document.getElementById('filter-strategy');
            filter.innerHTML = '<option value="all">全部策略</option>' + 
                Object.keys(STRATEGY_NAMES_CN).map(s => `<option value="${s}">${STRATEGY_NAMES_CN[s]}</option>`).join('');

            updateBadge();
            updateKPI();
            renderSummary();
            applyFilter();
            renderTop10();
            // 加载对应数据集的资金曲线
            loadEquityData(tab).then(() => {
                updateEquityChart();
            });
        }


        async function loadEquityData(dataset) {
            try {
                const res = await fetch(`equity_curves_${dataset}.json`);
                if (res.ok) {
                    equityData = await res.json();
                    console.log(`✅ 资金曲线加载 (${dataset}): ${Object.keys(equityData).length} 策略`);
                } else {
                    console.warn(`equity_curves_${dataset}.json 不存在`);
                    equityData = {};
                }
            } catch (e) {
                console.warn('加载资金曲线失败:', e);
                equityData = {};
            }
        }

        function updateBadge() {
            const badge = document.getElementById('dataset-badge');
            badge.textContent = currentTab === 'train' ? '训练集' : '测试集';
            badge.className = currentTab === 'train' 
                ? 'ml-2 px-2 py-0.5 bg-blue-500/20 text-blue-300 rounded text-xs border border-blue-500/30'
                : 'ml-2 px-2 py-0.5 bg-green-500/20 text-green-300 rounded text-xs border border-green-500/30';
        }

        // ==================== KPI ====================
        function updateKPI() {
            if (currentData.length === 0) {
                document.getElementById('kpi-strategies').textContent = '0';
                document.getElementById('kpi-best').textContent = '--';
                document.getElementById('kpi-return').textContent = '--';
                document.getElementById('kpi-sharpe').textContent = '--';
                return;
            }

            const stratStats = {};
            currentData.forEach(d => {
                const s = d.strategy;
                if (!stratStats[s]) stratStats[s] = { returns: [], sharpes: [], count: 0 };
                stratStats[s].returns.push(parseFloat(d.total_return_pct) || 0);
                stratStats[s].sharpes.push(parseFloat(d.sharpe_ratio) || 0);
                stratStats[s].count++;
            });

            const avgReturns = Object.entries(stratStats).map(([s, st]) => ({
                strategy: s,
                avgRet: st.returns.reduce((a,b) => a+b, 0) / st.count
            })).sort((a,b) => b.avgRet - a.avgRet);

            const best = avgReturns[0];
            const avgSharpeAll = currentData.reduce((sum, d) => sum + (parseFloat(d.sharpe_ratio) || 0), 0) / currentData.length;

            document.getElementById('kpi-strategies').textContent = Object.keys(stratStats).length;
            document.getElementById('kpi-best').textContent = STRATEGY_NAMES_CN[best.strategy] || best.strategy;
            document.getElementById('kpi-return').textContent = best.avgRet.toFixed(2) + '%';
            document.getElementById('kpi-sharpe').textContent = avgSharpeAll.toFixed(2);
        }

        // ==================== 汇总排名 ====================
        function renderSummary() {
            // 按策略分组统计
            const summaryMap = {};
            currentData.forEach(d => {
                const s = d.strategy;
                if (!summaryMap[s]) summaryMap[s] = { returns: [], maxdds: [], sharpes: [], trades: 0, count: 0 };
                summaryMap[s].returns.push(parseFloat(d.total_return_pct) || 0);
                summaryMap[s].maxdds.push(parseFloat(d.max_drawdown_pct) || 0);
                summaryMap[s].sharpes.push(parseFloat(d.sharpe_ratio) || 0);
                summaryMap[s].trades += parseInt(d.total_trades) || 0;
                summaryMap[s].count++;
            });

            const summary = Object.entries(summaryMap).map(([s, st]) => ({
                strategy: s,
                avg_return_pct: st.returns.reduce((a,b) => a+b, 0) / st.count,
                avg_maxdd_pct: st.maxdds.reduce((a,b) => a+b, 0) / st.count,
                avg_sharpe: st.sharpes.reduce((a,b) => a+b, 0) / st.count,
                total_trades: st.trades,
                sample_count: st.count
            })).sort((a,b) => b.avg_return_pct - a.avg_return_pct);

            const tbody = document.getElementById('summary-body');
            tbody.innerHTML = summary.map(s => `
                <tr class="border-b border-gray-800">
                    <td class="py-2" style="color:${STRATEGY_COLORS[s.strategy]||'#fff'}">${STRATEGY_NAMES_CN[s.strategy]||s.strategy}</td>
                    <td class="text-right ${s.avg_return_pct>=0?'text-green-400':'text-red-400'}">${s.avg_return_pct.toFixed(2)}%</td>
                    <td class="text-right text-blue-400">${s.avg_maxdd_pct.toFixed(2)}%</td>
                    <td class="text-right ${s.avg_sharpe>=0?'text-green-400':'text-red-400'}">${s.avg_sharpe.toFixed(2)}</td>
                    <td class="text-right text-gray-500">${s.sample_count}</td>
                </tr>
            `).join('');
        }

        // ==================== 表格 ====================
        function applyFilter() {
            const filterVal = document.getElementById('filter-strategy').value;
            pageSize = parseInt(document.getElementById('page-size').value);
            currentPage = 1;

            filteredData = currentData.filter(d => filterVal === 'all' || d.strategy === filterVal);
            if (sortField) filteredData.sort((a,b) => sortDesc ? (b[sortField]||0) - (a[sortField]||0) : (a[sortField]||0) - (b[sortField]||0));

            updatePagination();
            renderTable();
        }

        function sort(field) {
            if (sortField === field) sortDesc = !sortDesc; else { sortField = field; sortDesc = true; }
            applyFilter();
        }

        function updatePagination() {
            const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
            document.getElementById('total-pages').textContent = totalPages;
            document.getElementById('page-num').max = totalPages;
            document.getElementById('page-num').value = currentPage;
            document.getElementById('prev').disabled = currentPage === 1;
            document.getElementById('next').disabled = currentPage === totalPages;
        }

        function changePage(delta) {
            const totalPages = Math.ceil(filteredData.length / pageSize);
            const np = currentPage + delta;
            if (np >= 1 && np <= totalPages) {
                currentPage = np;
                updatePagination();
                renderTable();
            }
        }

        function goToPage() {
            let p = parseInt(document.getElementById('page-num').value) || 1;
            const totalPages = Math.ceil(filteredData.length / pageSize);
            if (p < 1) p = 1; if (p > totalPages) p = totalPages;
            currentPage = p;
            updatePagination();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);

            tbody.innerHTML = pageData.map(d => {
                const ret = parseFloat(d.total_return_pct) || 0;
                const color = ret >= 0 ? 'text-green-400' : 'text-red-400';
                return `
                    <tr>
                        <td class="py-1.5 text-gray-300">${STRATEGY_NAMES_CN[d.strategy]||d.strategy}</td>
                        <td class="text-right font-bold ${color}">${ret.toFixed(2)}%</td>
                        <td class="text-right text-blue-400">${parseFloat(d.annual_return||0).toFixed(2)}%</td>
                        <td class="text-right text-red-400">${parseFloat(d.max_drawdown_pct||0).toFixed(2)}%</td>
                        <td class="text-right ${parseFloat(d.sharpe_ratio||0)>=0?'text-green-400':'text-red-400'}">${parseFloat(d.sharpe_ratio||0).toFixed(2)}</td>
                        <td class="text-right text-gray-500">${parseFloat(d.win_rate||0).toFixed(1)}%</td>
                        <td class="text-right text-gray-500">${d.total_trades||0}</td>
                    </tr>
                `;
            }).join('');

            document.getElementById('table-info').textContent = `显示 ${start+1}-${Math.min(end, filteredData.length)} / ${filteredData.length} 条`;
        }

        // ==================== 图表 ====================
        function renderCharts() {
            setTimeout(renderDistChart, 100);
            setTimeout(updateEquityChart, 200);
        }

        function renderDistChart() {
            if (typeof Chart === 'undefined') return;
            const ctx = document.getElementById('dist-chart');
            if (!ctx) return;
            if (window.chartDist) window.chartDist.destroy();

            const bins = { '<-5%':0, '-5~0%':0, '0~5%':0, '5~10%':0, '10~15%':0, '>15%':0 };
            currentData.forEach(d => {
                const r = parseFloat(d.total_return_pct) || 0;
                if (r < -5) bins['<-5%']++;
                else if (r < 0) bins['-5~0%']++;
                else if (r < 5) bins['0~5%']++;
                else if (r < 10) bins['5~10%']++;
                else if (r < 15) bins['10~15%']++;
                else bins['>15%']++;
            });

            window.chartDist = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(bins),
                    datasets: [{ label: '策略数量', data: Object.values(bins), backgroundColor: 'rgba(59, 130, 246, 0.6)', borderColor: 'rgba(59, 130, 246, 1)', borderWidth: 1, borderRadius: 4 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false, aspectRatio: 2.5,
                    plugins: { legend: {display: false} },
                    scales: {
                        y: { beginAtZero: true, ticks: {color:'#9ca3af', stepSize:1}, grid:{color:'rgba(255,255,255,0.05)'} },
                        x: { ticks:{color:'#9ca3af'}, grid:{display:false} }
                    }
                }
            });
        }

        function updateEquityChart() {
            if (typeof Chart === 'undefined') return;
            const ctx = document.getElementById('equity-chart');
            if (!ctx) return;
            if (window.chartEquity) window.chartEquity.destroy();

            const strategy = document.getElementById('curve-strategy').value;
            const showBenchmark = document.getElementById('show-benchmark').checked;

            const datasets = [];

            // 基准
            if (showBenchmark) {
                datasets.push({
                    label: '基准 (100%)',
                    data: [{x:'2015-01-01', y:100}, {x:'2025-01-01', y:100}],
                    borderColor: 'rgba(156, 163, 175, 0.5)', borderWidth: 1, borderDash: [5,5], pointRadius:0, fill:false, tension:0.1
                });
            }

            // 策略曲线
            let curve = equityData[strategy];
            if (!curve) {
                // 回退：使用估算曲线
                const row = currentData.find(d => d.strategy === strategy);
                if (row) curve = generateApproxCurve(row);
            }

            if (curve && curve.length > 0) {
                datasets.push({
                    label: STRATEGY_NAMES_CN[strategy] || strategy,
                    data: curve,
                    borderColor: STRATEGY_COLORS[strategy] || '#3b82f6',
                    backgroundColor: (STRATEGY_COLORS[strategy] || '#3b82f6') + '20',
                    borderWidth: 2, fill: true, pointRadius: 0, tension: 0.3
                });
            }

            window.chartEquity = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: {intersect:false, mode:'index'},
                    plugins: { legend:{display:true, labels:{color:'#9ca3af'}}, tooltip:{backgroundColor:'rgba(0,0,0,0.8)', titleColor:'#fff', bodyColor:'#fff', padding:8} },
                    scales: {
                        x: { type:'time', time:{unit:'year'}, ticks:{color:'#6b7280'}, grid:{color:'rgba(255,255,255,0.05)'}, title:{display:true, text:'日期', color:'#9ca3af'} },
                        y: { ticks:{color:'#6b7280'}, grid:{color:'rgba(255,255,255,0.05)'}, title:{display:true, text:'资产净值 (%)', color:'#9ca3af'} }
                    }
                }
            });
        }

        function generateApproxCurve(row) {
            const start = new Date(row.start_date || '2015-01-01');
            const end = new Date(row.end_date || '2021-12-31');
            const totalRet = parseFloat(row.total_return_pct) || 0;
            const points = 30;
            const curve = [];
            for (let i = 0; i <= points; i++) {
                const ratio = i / points;
                const date = new Date(start);
                date.setDate(date.getDate() + Math.floor((end - start) * ratio / (1000*60*60*24)));
                const value = 100 * (1 + totalRet/100 * Math.pow(ratio, 0.8));
                curve.push({ x: date.toISOString().split('T')[0], y: value });
            }
            return curve;
        }

        // ==================== Top 10 ====================
        function renderTop10() {
            const summary = {};
            currentData.forEach(d => {
                const s = d.strategy;
                if (!summary[s]) summary[s] = { returns: [], count: 0 };
                summary[s].returns.push(parseFloat(d.total_return_pct) || 0);
                summary[s].count++;
            });

            const top10 = Object.entries(summary)
                .map(([s, st]) => ({ strategy: s, avgRet: st.returns.reduce((a,b) => a+b, 0) / st.count }))
                .sort((a,b) => b.avgRet - a.avgRet)
                .slice(0, 10);

            const grid = document.getElementById('top10-grid');
            grid.innerHTML = top10.map((d, i) => `
                <div class="glass-card p-2 hover:bg-white/5 transition">
                    <div class="text-[10px] text-gray-400 mb-1">#${i+1} ${STRATEGY_NAMES_CN[d.strategy]||d.strategy}</div>
                    <div class="text-lg font-bold ${d.avgRet>=0?'text-green-400':'text-red-400'}">${d.avgRet.toFixed(2)}%</div>
                </div>
            `).join('');

            // 填充策略下拉框
            const sel = document.getElementById('curve-strategy');
            sel.innerHTML = Object.keys(STRATEGY_NAMES_CN).map(s => `<option value="${s}">${STRATEGY_NAMES_CN[s]}</option>`).join('');
        }

        // ==================== 工具函数 ====================
        function setStatus(text, loading) {
            const el = document.getElementById('status');
            el.textContent = text;
            document.getElementById('loading-bar').style.display = loading ? 'block' : 'none';
        }

        // 事件绑定
        document.getElementById('filter-strategy').addEventListener('change', applyFilter);
        document.getElementById('page-size').addEventListener('change', () => { currentPage = 1; applyFilter(); });
        document.getElementById('prev').addEventListener('click', () => changePage(-1));
        document.getElementById('next').addEventListener('click', () => changePage(1));
        document.getElementById('page-num').addEventListener('change', goToPage);
        document.getElementById('page-num').addEventListener('keydown', e => { if (e.key === 'Enter') goToPage(); });
        document.getElementById('curve-strategy').addEventListener('change', updateEquityChart);
        document.getElementById('show-benchmark').addEventListener('change', updateEquityChart);
    </script>
</body>
</html>
